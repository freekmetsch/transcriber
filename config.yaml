# Transcriber configuration
# Machine-specific overrides go in config.local.yaml (gitignored)

# Push-to-talk hotkey (hold to record, release to transcribe)
hotkey: ctrl+shift+space

# Audio recording settings
audio:
  sample_rate: 16000
  channels: 1
  # device: null  # null = system default microphone

# Whisper model settings
whisper:
  model_size: distil-large-v3  # English-only distilled; fast on GPU with near large-v3 accuracy
  device: cuda             # Options: cuda, cpu
  compute_type: float16    # Options: float16 (GPU), int8 (CPU), float32

  # Cloud dictation. Default: Groq two-call (Whisper STT → Llama text polish) —
  # eliminates the audio-chat hallucination class by construction. Falls back
  # to local Whisper + (streaming: formatting commands | batch: Ollama) on
  # failure, rate-limit, or offline.
  cloud:
    enabled: true                          # Falls back to local if api_key is empty.
    provider: groq                         # groq | openrouter
    # Groq two-call (default):
    stt_model: whisper-large-v3-turbo
    polish_model: llama-3.3-70b-versatile
    stt_timeout: 3.0                       # STT read timeout (s) before fallback. Set for residential WiFi; drop to 1.0 on LAN if you want faster fallback.
    polish_timeout: 3.0                    # Polish read timeout (s); soft-fails to raw STT. Drop to 1.2 on LAN.
    # OpenRouter audio-chat alternative (used only when provider: openrouter):
    #   model: openai/gpt-audio
    #   timeout: 2.0
    # api_key: SET IN config.local.yaml — never commit here.

# LLM post-processing (Ollama)
postprocessing:
  enabled: true            # Set to false to skip post-processing
  model: qwen2.5:3b        # Ollama model for formatting and cleanup
  base_url: http://localhost:11434
  timeout: 10              # Seconds before falling back to raw text

# Streaming mode — VAD-chunked phrase-by-phrase dictation
streaming:
  enabled: true              # false = batch mode (record all, transcribe at end)
  vad:
    engine: silero           # silero | energy (silero auto-falls-back to energy on load fail)
    threshold: 0.5           # Silero speech probability (0.5 balanced; raise to 0.6 in noisy rooms)
    min_silence_ms: 600      # Silence gap before segment end event
    speech_pad_ms: 120       # Silero pads reported start/end by this
    preroll_ms: 300          # Pre-speech ring buffer to capture word onsets
  # EnergyVAD overrides (only consulted when vad.engine: energy)
  silence_threshold: 0.01
  silence_duration_ms: 600
  min_segment_ms: 500        # Ignore segments shorter than this (coughs, clicks)
  max_segment_s: 30          # Force-cut very long segments

# Vocabulary Brain — learning system
brain:
  enabled: true            # Set to false to disable vocabulary brain
  db_path: brain.db        # SQLite database path (relative to app dir)
  auto_learn_threshold: 3  # Corrections needed before auto-adding to vocabulary
  prompt_max_chars: 500    # Max characters for Whisper initial_prompt
  correction_hotkey: ctrl+shift+c  # Hotkey to open correction window
  correction_mode: hotkey           # auto | hotkey | off
  correction_timeout: 8            # Seconds before auto-hiding (0 = no auto-hide)
  notifications: true              # Windows toast notifications for brain events

# UI polish settings
ui:
  sounds: true               # Play start/stop/error tones
  output_method: auto        # auto | type | paste (type = SendInput, paste = clipboard)
  auto_start: false          # Start with Windows (toggle via tray menu)
  show_level_meter: true     # Live mic level bar during recording
  show_language: true        # EN/NL badge on the text popup after each segment
  overlay_visible_on_start: true     # Always-visible pill (Win+H-style). false = start hidden.
  toggle_overlay_hotkey: ctrl+shift+h  # Show/hide the overlay (no-op if dismissed via tray)
  cycle_mode_hotkey: ctrl+shift+m      # Cycle dictation modes (Default / Email / Code ...)
  repaste_hotkey: ctrl+alt+v           # Re-paste the most recent transcription into the focused text field
  history_length: 10                   # Items kept in the in-memory transcription history (drives Copy last + re-paste)

# Dictation modes — omit or leave null to use built-ins (Default, Email, Code).
# Schema per entry: { name, polish_prompt_addendum, output_format }.
#   output_format: "default" (cloud polish + formatting commands)
#                | "raw"     (skip cloud polish + skip formatting commands)
# Example custom list:
# modes:
#   - name: Default
#   - name: Email
#     polish_prompt_addendum: "Format as a polite professional email body. Preserve the user's tone."
#   - name: Code
#     output_format: raw
modes: null
