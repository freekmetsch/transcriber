# Transcriber configuration

# Push-to-talk hotkey (hold to record, release to transcribe)
hotkey: ctrl+shift+space

# Audio recording settings
audio:
  sample_rate: 16000
  channels: 1
  # device: null  # null = system default microphone

# Whisper model settings
whisper:
  model_size: large-v3    # Options: tiny, base, small, medium, large-v2, large-v3
  device: cuda             # Options: cuda, cpu
  compute_type: float16    # Options: float16 (GPU), int8 (CPU), float32

# LLM post-processing (Ollama)
postprocessing:
  enabled: true            # Set to false to skip post-processing
  model: qwen2.5:3b        # Ollama model for formatting and cleanup
  base_url: http://localhost:11434
  timeout: 10              # Seconds before falling back to raw text
